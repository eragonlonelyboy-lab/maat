<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MAAT</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 3 C22 8 25 15 24 22 C20 20 17 16 16 11 C15 16 12 20 8 22 C7 15 10 8 16 3 Z' fill='%23e8b64c'/%3E%3Crect x='15' y='22' width='2' height='7' rx='1' fill='%23e8b64c'/%3E%3C/svg%3E">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Boot ceremony: real system state, gold feather, then the board. -->
<div id="boot">
  <canvas id="boot-canvas"></canvas>
  <div class="boot-rings" aria-hidden="true">
    <svg viewBox="0 0 400 400">
      <circle class="ring r1" cx="200" cy="200" r="150"/>
      <circle class="ring r2" cx="200" cy="200" r="178"/>
      <circle class="ring r3" cx="200" cy="200" r="120"/>
    </svg>
  </div>
  <div id="boot-greet" class="boot-greet"></div>
  <div id="boot-sub" class="boot-sub"></div>
  <div id="boot-log" class="boot-log"></div>
  <div class="boot-skip">click or Esc to skip</div>
</div>

<header class="top">
  <div class="brand">
    <svg class="feather" viewBox="0 0 32 32" aria-hidden="true">
      <path d="M16 3 C22 8 25 15 24 22 C20 20 17 16 16 11 C15 16 12 20 8 22 C7 15 10 8 16 3 Z"/>
      <rect x="15" y="22" width="2" height="7" rx="1"/>
    </svg>
    <span class="wordmark">M.A.A.T</span>
    <span class="tagline">multi-agent attention terminal</span>
  </div>

  <div class="search-wrap">
    <span class="search-ico">⌕</span>
    <input id="search" class="search" type="search" placeholder="Search projects…" autocomplete="off">
  </div>

  <div class="agent-strip" id="agent-strip"></div>

  <div class="top-status">
    <span class="scan-stamp" id="scan-stamp">waiting for first scan…</span>
    <button id="refresh" class="btn" title="Force a rescan now">refresh</button>
    <button id="theme" class="btn iconbtn" title="Toggle light / dark">◐</button>
    <span id="health-dot" class="dot" title="self-health"></span>
    <div class="clock"><span id="clock-hm">--:--</span><span id="clock-s">--</span><em id="clock-date"></em></div>
  </div>
</header>

<div class="hud">

  <!-- LEFT RAIL: vitals + the #1 widget -->
  <aside class="rail rail-left">
    <section class="block">
      <h2>System vitals</h2>
      <div class="vitals" id="vitals"></div>
    </section>
    <section class="block grow">
      <h2>Needs you <span id="needs-count" class="count"></span></h2>
      <div id="needs-you" class="needs-list"></div>
    </section>
  </aside>

  <!-- CENTER STAGE: projects are the base unit -->
  <main class="stage" id="stage"></main>

  <!-- RIGHT RAIL: contextual sessions + self-health -->
  <aside class="rail rail-right">
    <section class="block grow">
      <h2 class="rail-title"><span id="rail-label">Live now</span></h2>
      <div id="rail-sessions"></div>
    </section>
    <section class="block health-block">
      <h2>Self-health <span id="health-dot2" class="dot"></span></h2>
      <div id="health-line" class="health-line"></div>
      <div class="health-foot">local only · zero tokens in this loop · <a href="/api/board" target="_blank">raw board</a></div>
    </section>
  </aside>

</div>

<!-- Session detail slide-over: away digest, receipts, the agent's own tasks -->
<aside id="detail" class="detail" hidden>
  <div class="detail-head">
    <h3 id="detail-title"></h3>
    <button class="btn" id="detail-close">close</button>
  </div>
  <div id="detail-body"></div>
</aside>
<div id="scrim" class="scrim" hidden></div>

<script src="boot.js"></script>
<script src="orb.js"></script>
<script src="braingraph.js"></script>
<script src="app.js"></script>
</body>
</html>
